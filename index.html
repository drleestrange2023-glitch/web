<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五〇六所 · 极简AI工作空间</title>
    <style>
        /* ========== 核心色彩与视觉变量 ========== */
        :root {
            --bg-body: #ffffff;              /* 纯净白色背景 */
            --bg-sidebar: #f9f9fa;            /* 极浅灰色侧边栏 */
            --bg-card: #ffffff;
            --text-primary: #333333;          /* 高对比主文本 */
            --text-secondary: #666666;        /* 辅助文本 */
            --color-accent: #007AFF;           /* 科技蓝交互色 */
            --color-accent-hover: #005bb5;
            --border-color: #eaeaea;           /* 极简分割线 */
            --radius-md: 8px;
            --radius-lg: 12px;
            --transition-base: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* ========== 全局重置与排版 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;           /* 外层禁止滚动，右侧区域独立滚动 */
        }

        /* ========== 左侧固定导航 ========== */
        .sidebar {
            width: 240px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }

        .logo-area {
            padding: 32px 24px;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 1.5px;
            border-bottom: 1px solid transparent;
        }

        .nav-menu {
            list-style: none;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            transition: var(--transition-base);
        }

        .nav-item:hover {
            background-color: rgba(0, 122, 255, 0.05);
            color: var(--color-accent);
        }

        .nav-item.active {
            background-color: rgba(0, 122, 255, 0.08);
            color: var(--color-accent);
            font-weight: 600;
        }

        /* ========== 右侧滚动内容区 ========== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 48px 64px;
            scroll-behavior: smooth;
        }

        /* 视图切换 */
        .view-section {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ========== 组件样式 ========== */

        /* 主页品牌区 */
        .hero-banner {
            margin-bottom: 56px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--border-color);
        }

        .hero-banner h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .hero-banner p {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 600px;
            line-height: 1.6;
        }

        /* 标题与搜索条 */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
        }

        .search-box {
            width: 100%;
            max-width: 360px;
            margin-bottom: 32px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--bg-body);
            color: var(--text-primary);
            transition: var(--transition-base);
            outline: none;
        }

        .search-input:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .search-input::placeholder {
            color: #999;
        }

        /* 卡片网格 (响应式) */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        /* 卡片 */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: var(--transition-base);
            cursor: pointer;
            height: 320px;               /* 统一高度，保持秩序感 */
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.06);
            border-color: var(--color-accent);
        }

        .card-image-wrapper {
            height: 160px;
            width: 100%;
            background-color: #f0f2f5;   /* 占位背景 */
            position: relative;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: auto;          /* 将底部信息推下去 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .card-dev-label {
            color: #999;
        }

        .card-dev-name {
            color: var(--color-accent);
            font-weight: 500;
        }

        /* 无结果提示 */
        .no-results {
            grid-column: 1 / -1;
            padding: 40px;
            text-align: center;
            color: var(--text-secondary);
            background-color: var(--bg-sidebar);
            border-radius: var(--radius-lg);
            border: 1px dashed var(--border-color);
        }
    </style>
</head>
<body>
    <!-- 左侧导航栏 -->
    <aside class="sidebar">
        <div class="logo-area">五〇六所</div>
        <ul class="nav-menu">
            <li class="nav-item active" data-target="view-home">主页</li>
            <li class="nav-item" data-target="view-apps">趣味APP</li>
            <li class="nav-item" data-target="view-workflows">AI工作流</li>
        </ul>
    </aside>

    <!-- 右侧主内容区域（可滚动） -->
    <main class="main-content" id="main-scroll-area">

        <!-- ========== 视图：主页 ========== -->
        <section id="view-home" class="view-section active">
            <div class="hero-banner">
                <h1>释放创造力，简化工作流。</h1>
                <p>五〇六所致力于打造极致纯净的数字体验空间。在这里探索前沿的趣味APP与高效的AI自动化工作流，赋能您的每一个灵感瞬间。</p>
            </div>

            <!-- 推荐趣味APP -->
            <div class="section-header">
                <h2 class="section-title">推荐趣味APP</h2>
            </div>
            <div class="card-grid" id="grid-home-apps">
                <!-- 动态JS渲染 -->
            </div>

            <!-- 推荐AI工作流 (添加上边距) -->
            <div class="section-header" style="margin-top: 24px;">
                <h2 class="section-title">推荐AI工作流</h2>
            </div>
            <div class="card-grid" id="grid-home-workflows">
                <!-- 动态JS渲染 -->
            </div>
        </section>

        <!-- ========== 视图：趣味APP列表 ========== -->
        <section id="view-apps" class="view-section">
            <div class="search-box">
                <input type="text" class="search-input" id="search-apps" placeholder="搜索趣味APP名称或描述...">
            </div>
            <div class="card-grid" id="grid-all-apps">
                <!-- 动态JS渲染 -->
            </div>
        </section>

        <!-- ========== 视图：AI工作流列表 ========== -->
        <section id="view-workflows" class="view-section">
            <div class="search-box">
                <input type="text" class="search-input" id="search-workflows" placeholder="搜索AI工作流名称或描述...">
            </div>
            <div class="card-grid" id="grid-all-workflows">
                <!-- 动态JS渲染 -->
            </div>
        </section>
    </main>

    <script>
        (function() {
            // ---------- 模拟数据 ----------
            const appsData = [
                { id: 'a1', title: '像素画生成器', desc: '将任何上传的照片一键转换为复古8-bit像素艺术风格，支持调色板自定义。', dev: '五〇六所视觉组', img: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600&h=400&fit=crop' },
                { id: 'a2', title: '灵感白噪音', desc: '基于AI生成的环境音效，混合咖啡馆、雨林、深海等场景，帮助您快速进入心流状态。', dev: 'Audio AI', img: 'https://images.unsplash.com/photo-1518609878373-06d740f60d8b?w=600&h=400&fit=crop' },
                { id: 'a3', title: '极简习惯追踪', desc: '摒弃繁杂功能的打卡工具，用最纯粹的方式记录您的每日坚持。', dev: '效率生活实验室', img: 'https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=600&h=400&fit=crop' },
                { id: 'a4', title: '赛博朋克头像舱', desc: '上传自拍，利用稳定扩散模型生成独特的赛博朋克风格科幻头像。', dev: 'CyberLab', img: 'https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=600&h=400&fit=crop' },
                { id: 'a5', title: '星空冥想指南', desc: '结合每日星象与AI语音指导，为您提供专属的睡前5分钟冥想放松体验。', dev: 'Mindful Space', img: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?w=600&h=400&fit=crop' },
                { id: 'a6', title: '复古游戏机模拟', desc: '在浏览器中直接体验经典的掌机小游戏，找回童年乐趣。', dev: 'Retro Games', img: 'https://images.unsplash.com/photo-1531525645387-7f14be1bdbbd?w=600&h=400&fit=crop' }
            ];

            const workflowsData = [
                { id: 'w1', title: '长文章总结提取器', desc: '自动抓取URL内容，提取核心观点，并按“背景、核心要点、结论”输出结构化摘要。', dev: '五〇六所效率组', img: 'https://images.unsplash.com/photo-1456324504439-367cee3b3c32?w=600&h=400&fit=crop' },
                { id: 'w2', title: '跨语言会议纪要', desc: '上传会议录音，自动进行多语种识别转录，并生成带有待办事项的会议简报。', dev: 'Voice AI Team', img: 'https://images.unsplash.com/photo-1516321497487-e288fb19713f?w=600&h=400&fit=crop' },
                { id: 'w3', title: '代码评审助手', desc: '接入您的代码库，自动分析代码异味，提供优化建议及安全漏洞检查。', dev: 'DevOps Lab', img: 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=600&h=400&fit=crop' },
                { id: 'w4', title: '社交媒体运营分发', desc: '输入一段文字素材，AI自动为您改写为适配微博、小红书、Twitter的不同风格文案。', dev: 'Marketing AI', img: 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=600&h=400&fit=crop' },
                { id: 'w5', title: '行业竞品监控', desc: '定时扫描指定竞品网站动态，结合大模型分析其最新战略意图并推送到您的邮箱。', dev: 'Data Insights', img: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&h=400&fit=crop' }
            ];

            // ---------- 生成卡片 HTML ----------
            function generateCardHTML(item) {
                const targetUrl = 'https://www.coze.cn/template';   // 所有卡片跳转相同模板页
                return `
                    <a href="${targetUrl}" target="_blank" class="card" title="查看：${item.title}">
                        <div class="card-image-wrapper">
                            <img src="${item.img}" alt="${item.title}" class="card-image" loading="lazy">
                        </div>
                        <div class="card-content">
                            <h3 class="card-title">${item.title}</h3>
                            <p class="card-desc">${item.desc}</p>
                            <div class="card-footer">
                                <span class="card-dev-label">开发人员</span>
                                <span class="card-dev-name">${item.dev}</span>
                            </div>
                        </div>
                    </a>
                `;
            }

            // 渲染网格，支持空状态
            function renderGrid(containerId, data) {
                const container = document.getElementById(containerId);
                if (!container) return;
                if (data.length === 0) {
                    container.innerHTML = '<div class="no-results">✨ 没有找到相关的内容，请尝试其他关键词。</div>';
                } else {
                    container.innerHTML = data.map(generateCardHTML).join('');
                }
            }

            // ---------- 导航切换 + 重置滚动 ----------
            function setupNavigation() {
                const navItems = document.querySelectorAll('.nav-item');
                const viewSections = document.querySelectorAll('.view-section');
                const mainScrollArea = document.getElementById('main-scroll-area');

                navItems.forEach(item => {
                    item.addEventListener('click', () => {
                        // 更新导航激活态
                        navItems.forEach(nav => nav.classList.remove('active'));
                        item.classList.add('active');

                        // 切换视图
                        const targetId = item.getAttribute('data-target');
                        viewSections.forEach(section => {
                            if (section.id === targetId) {
                                section.classList.add('active');
                            } else {
                                section.classList.remove('active');
                            }
                        });

                        // 滚动到顶部
                        if (mainScrollArea) mainScrollArea.scrollTop = 0;
                    });
                });
            }

            // ---------- 搜索过滤 ----------
            function setupSearch() {
                const searchApps = document.getElementById('search-apps');
                const searchWorkflows = document.getElementById('search-workflows');

                if (searchApps) {
                    searchApps.addEventListener('input', (e) => {
                        const keyword = e.target.value.toLowerCase().trim();
                        const filtered = appsData.filter(item =>
                            item.title.toLowerCase().includes(keyword) ||
                            item.desc.toLowerCase().includes(keyword)
                        );
                        renderGrid('grid-all-apps', filtered);
                    });
                }

                if (searchWorkflows) {
                    searchWorkflows.addEventListener('input', (e) => {
                        const keyword = e.target.value.toLowerCase().trim();
                        const filtered = workflowsData.filter(item =>
                            item.title.toLowerCase().includes(keyword) ||
                            item.desc.toLowerCase().includes(keyword)
                        );
                        renderGrid('grid-all-workflows', filtered);
                    });
                }
            }

            // ---------- 初始化所有视图 ----------
            function initApp() {
                // 主页推荐：取前3个
                renderGrid('grid-home-apps', appsData.slice(0, 3));
                renderGrid('grid-home-workflows', workflowsData.slice(0, 3));

                // 列表页全部
                renderGrid('grid-all-apps', appsData);
                renderGrid('grid-all-workflows', workflowsData);

                // 绑定交互
                setupNavigation();
                setupSearch();
            }

            // 启动
            document.addEventListener('DOMContentLoaded', initApp);
        })();
    </script>
</body>
</html>
